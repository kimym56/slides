<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      const localePaths = { en: "/en", ko: "/kr" };
      const pathname = window.location.pathname;
      const normalizedPath = pathname.length > 1 ? pathname.replace(/\/+$/, "") : pathname;
      const isEnglishPath =
        normalizedPath === localePaths.en || normalizedPath.startsWith(`${localePaths.en}/`);
      const isKoreanPath =
        normalizedPath === localePaths.ko || normalizedPath.startsWith(`${localePaths.ko}/`);
      const preferredLanguages = navigator.languages?.length
        ? navigator.languages
        : [navigator.language];
      const detectedLocale = preferredLanguages.some((language) =>
        language.toLowerCase().startsWith("ko"),
      )
        ? "ko"
        : "en";

      if (!isEnglishPath && !isKoreanPath) {
        window.history.replaceState(
          {},
          "",
          `${localePaths[detectedLocale]}${window.location.search}${window.location.hash}`,
        );
      }

      const initialLocale = isEnglishPath ? "en" : isKoreanPath ? "ko" : detectedLocale;
      document.documentElement.lang = initialLocale;
    </script>
    <title>YongMin Kim - Design Engineer Portfolio</title>
    <!-- English uses Inter; the Korean locale switches to Pretendard. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
